{% extends 'base.html' %}

{% block content %}

<h1>Clientes</h1>

<a href="/clientes/nuevo/" class="btn">
    Nuevo Cliente
</a>

<br><br>

<table>

    <tr>
        <th>Nombre</th>
        <th>Cedula</th>
        <th>Telefono</th>
        <th>Acciones</th>
    </tr>

    {% for cliente in clientes %}

    <tr>

        <td>{{ cliente.nombre }}</td>
        <td>{{ cliente.cedula }}</td>
        <td>{{ cliente.telefono }}</td>

        <td>

            <a href="/clientes/editar/{{ cliente.id }}/"
               class="btn">
               Editar
            </a>

            <a href="/clientes/eliminar/{{ cliente.id }}/"
               class="btn btn-danger">
               Eliminar
            </a>

        </td>

    </tr>

    {% endfor %}

</table>

{% endblock %}
