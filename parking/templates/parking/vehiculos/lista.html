{% extends 'base.html' %}

{% block content %}

<h1>Vehiculos</h1>

<a href="/vehiculos/nuevo/" class="btn">
    Nuevo Vehiculo
</a>

<br><br>

<table>

<tr>
    <th>Cliente</th>
    <th>Placa</th>
    <th>Marca</th>
    <th>Color</th>
    <th>Acciones</th>
</tr>

{% for vehiculo in vehiculos %}

<tr>

    <td>{{ vehiculo.cliente }}</td>
    <td>{{ vehiculo.placa }}</td>
    <td>{{ vehiculo.marca }}</td>
    <td>{{ vehiculo.color }}</td>

    <td>

        <a href="/vehiculos/editar/{{ vehiculo.id }}/"
           class="btn">
           Editar
        </a>

        <a href="/vehiculos/eliminar/{{ vehiculo.id }}/"
           class="btn btn-danger">
           Eliminar
        </a>

    </td>

</tr>

{% endfor %}

</table>

{% endblock %}
